name: F-Lab SonarCloud Code Analyze

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  CACHED_DEPENDENCIES_PATHS: '**/node_modules'

jobs:
  CodeAnalyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set SonarCloud Project Key
        run: |
          REPO_NAME=$(echo $GITHUB_REPOSITORY | cut -d '/' -f 2)
          ORG_NAME=$(echo $GITHUB_REPOSITORY | cut -d '/' -f 1)
          SONAR_PROJECT_KEY="${ORG_NAME}_${REPO_NAME}"
          echo "SONAR_PROJECT_KEY=$SONAR_PROJECT_KEY" >> $GITHUB_ENV 

      - name: Set up JDK
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Apply SonarQube
        run: |
          chmod +x ./gradlew
          awk '/^plugins {/ {print; print "    id(\"org.sonarqube\") version \"5.1.0.4882\""; next} 1' build.gradle.kts > build.gradle.kts.tmp && mv build.gradle.kts.tmp build.gradle.kts
          
          cat >> build.gradle.kts << 'EOF'

          sonarqube {
              properties {
                  property("sonar.projectKey", System.getenv("SONAR_PROJECT_KEY"))
                  property("sonar.organization", "f-lab-edu-1")
                  property("sonar.host.url", "https://sonarcloud.io")
                  property("sonar.sources", "app/src/main")
                  property("sonar.tests", "app/src/test,app/src/androidTest")
                  property("sonar.java.binaries", "app/build/tmp/kotlin-classes")
                  property("sonar.kotlin.binaries", "app/build/tmp/kotlin-classes")
              }
          }
          EOF

      - name: Analyze
        run: ./gradlew sonar -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }} -Dsonar.organization=f-lab-edu-1 -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=${{ secrets.SECRET_SONARQUBE }} -Dsonar.gradle.skipCompile=true
        env:
          SONAR_TOKEN: ${{ secrets.SECRET_SONARQUBE }}
